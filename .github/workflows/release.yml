# .github/workflows/release.yml
name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write      # needed to create GitHub Releases
  id-token: write      # needed for npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install -g pnpm
      - run: pnpm install --frozen-lockfile

      # Full quality gate before any publish
      - run: pnpm lint
      - run: pnpm test

      # Publish with provenance — links the npm package to this
      # exact GitHub Actions run so users can verify the supply chain
      - run: pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Create a GitHub Release with auto-generated changelog
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true  # pulls from merged PRs since last tag